name: Build Windows EXE

# Trigger:
# - on push to main/master branch (build + upload artifact only)
# - on push of a version tag like "v1.0.0" (build + create a GitHub Release with the exe attached)
# - manual run (via the "Run workflow" button in the Actions tab)
on:
  push:
    branches: [main, master]
    tags:
      - "v*.*.*"
  workflow_dispatch: {}

permissions:
  contents: write   # required to create a GitHub Release

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install psutil pyinstaller

      - name: Build EXE with PyInstaller
        run: |
          pyinstaller --onefile --windowed --name "MemoryMonitor" memory_monitor.py

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: MemoryMonitor-windows-exe
          path: dist/MemoryMonitor.exe
          if-no-files-found: error

      # Only runs when the push is a version tag, e.g. "v1.0.0"
      - name: Create GitHub Release and attach EXE
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/MemoryMonitor.exe
          generate_release_notes: true
